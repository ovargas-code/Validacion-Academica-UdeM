spring:
  application:
    name: validacion-academica-ms
  config:
    import: optional:file:.env[.properties]

  jackson:
    serialization:
      write-dates-as-timestamps: false

  security:
    user:
      name: ${ADMIN_USER:admin}
      password: ${ADMIN_PASSWORD:udem2026}
      roles: ADMIN

  # Perfil por defecto: H2 en memoria.
  # Importante: aquí NO se leen DB_URL/DB_USERNAME/DB_PASSWORD para evitar
  # mezclar H2 con valores de PostgreSQL cargados desde .env.
  datasource:
    url: jdbc:h2:mem:validaciondb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: ${H2_CONSOLE_ENABLED:false}
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    open-in-view: false
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql: true

  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    encoding: UTF-8
    mode: HTML
    cache: false

  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        debug: ${MAIL_DEBUG:false}
        smtp:
          auth: true
          connectiontimeout: 10000
          timeout: 10000
          writetimeout: 10000
          starttls:
            enable: ${MAIL_STARTTLS_ENABLE:false}
            required: ${MAIL_STARTTLS_REQUIRED:false}
          ssl:
            enable: ${MAIL_SSL_ENABLE:true}
            trust: smtp.gmail.com

  sql:
    init:
      mode: always

app:
  rate-limit:
    cache:
      expire-after-access-minutes: 10
      maximum-size: 100000
    rules:
      - prefix: /api/auth/login
        capacity: 5
        refill-minutes: 1
      - prefix: /api/validations/confirm
        capacity: 5
        refill-minutes: 1
      - prefix: /api/validations/
        capacity: 10
        refill-minutes: 1
      - prefix: /api/v1/verificaciones/
        capacity: 30
        refill-minutes: 1
  security:
    jwt:
      secret: ${JWT_SECRET:changeme-replace-in-production-min32chars!}
      expiration-ms: ${JWT_EXPIRATION_MS:3600000}
    cors:
      allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

server:
  port: ${SERVER_PORT:8080}

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%X{requestId:----------}] %-5level %logger{36} - %msg%n"
  level:
    root: INFO
    co.edu.udemedellin: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: never
    prometheus:
      enabled: true
  health:
    mail:
      enabled: false
  metrics:
    tags:
      application: ${spring.application.name}
